name: CI

on:
  push:
    branches: [main, mudbrickv2]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (lint + type-check + test)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @mudbrick/web tsc -b

      - name: Lint
        run: pnpm --filter @mudbrick/web lint

      - name: Test with coverage
        run: pnpm --filter @mudbrick/web test -- --coverage --reporter=verbose

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: apps/web/coverage/
          retention-days: 14

  backend:
    name: Backend (type-check + test)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx pytest-cov

      - name: Type check
        run: python -m mypy . --ignore-missing-imports || true

      - name: Test with coverage
        run: python -m pytest tests/ -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/api/coverage.xml
          retention-days: 14

  tauri-check:
    name: Tauri cargo check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check
